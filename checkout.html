<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body{
  font-family:Poppins;
  background:#fff6f7;
  margin:0;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:30px;
}

/* CARD */
.card{
  background:white;
  border-radius:15px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  margin-bottom:20px;
}

/* PRODUCT */
.product{
  display:flex;
  gap:20px;
  align-items:center;
}

.product img{
  width:120px;
  border-radius:10px;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  background:linear-gradient(135deg,#ff758c,#ff4d6d);
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

  <h2 style="font-family:Playfair Display;">Checkout</h2>

  <!-- PRODUCT -->
  <div class="card product">
    <img id="img">
    <div>
      <h3 id="name"></h3>
      <p id="price"></p>
    </div>
  </div>

  <!-- ADDRESS -->
  <div class="card">
    <h3>Shipping Details</h3>

    <input id="username" placeholder="Full Name">
    <input id="address" placeholder="Address">
    <input id="city" placeholder="City">
    <input id="pincode" placeholder="Pincode">
  </div>

  <button onclick="next()">Continue to Payment</button>

</div>

<script>
let item = JSON.parse(localStorage.getItem("checkoutItem"));

document.getElementById("img").src = item.img;
document.getElementById("name").innerText = item.name;
document.getElementById("price").innerText = "₹" + item.price;

function next(){

  let user = {
    name:username.value,
    address:address.value,
    city:city.value,
    pincode:pincode.value
  };

  localStorage.setItem("userDetails", JSON.stringify(user));

  window.location.href="payment.html";
}
</script>

</body>
</html>
